# Date snapshot (null = dernière disponible dans Neon)
snapshot_date: null

market:
  risk_free_rate: 0.0
  dividend_yield: 0.0
  min_open_interest: 0.01
  min_time_to_expiry_days: 1
  max_time_to_expiry_years: 1.0
  max_relative_spread: 0.5
  min_iv: 0.05   # borne basse IV acceptee (calibration + panel)
  max_iv: 3.0    # borne haute IV acceptee (calibration + panel)
  smile_convention: otm  # otm | calls | puts | all
  drop_phantom_bid_ask: true  # options fantomes : exclure si bid NaN ou ask NaN

calibration:
  use_vega_weight: true
  use_liquidity_weight: true
  min_strikes_per_slice: 5
  optimizer: L-BFGS-B
  feller_penalty: 1000.0

# Baseline smile — paramétrisation SVI brute (Gatheral)
svi:
  a: [0.0, 5.0]
  b: [0.0, 5.0]
  rho: [-0.999, 0.999]
  m: [-1.5, 1.5]
  sigma: [0.01, 2.0]

heston:
  v0: [0.001, 4.0]
  kappa: [0.05, 15.0]
  theta: [0.001, 4.0]
  sigma: [0.05, 3.0]
  rho: [-0.99, 0.99]
  initial:
    kappa: 1.5
    sigma: 0.4
    rho: -0.5

merton:
  weight_scheme: uniform   # uniform | vega | volume
  sigma: [0.05, 2.0]
  lambda_jump: [0.0, 10.0]
  mu_jump: [-1.0, 1.0]
  sigma_jump: [0.01, 1.0]

svi_surface:
  n_moneyness: 50
  n_maturities: 30
  k_pad: 0.05

outputs:
  figures_dir: outputs/figures
  reports_dir: outputs/reports
